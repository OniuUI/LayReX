name: Publish NuGet

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: Semantic version to publish (e.g. 0.4.0). Use for one-off releases without changing main’s auto line.
        required: true
        type: string
  push:
    branches: [main, master]
    tags:
      - "v*"

concurrency:
  group: nuget-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Resolve publish version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.package_version }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.ref }}" != "refs/heads/main" ] && [ "${{ github.ref }}" != "refs/heads/master" ]; then
            echo "Publish job only runs for main/master, tags, or workflow_dispatch; got ${{ github.ref }}" >&2
            exit 1
          fi
          CHOSEN=$(python3 << 'PY'
          import json
          import pathlib
          import re
          import urllib.error
          import urllib.request

          text = pathlib.Path("Directory.Build.props").read_text(encoding="utf-8")
          match = re.search(
              r"<LayeredChatVersion>([0-9]+)\.([0-9]+)\.([0-9]+)</LayeredChatVersion>",
              text,
          )
          if not match:
              raise SystemExit("LayeredChatVersion not found in Directory.Build.props")
          base = f"{match.group(1)}.{match.group(2)}.{match.group(3)}"
          prefix = f"{match.group(1)}.{match.group(2)}"
          pattern = re.compile(r"^" + re.escape(prefix) + r"\.[0-9]+$")
          url = "https://api.nuget.org/v3-flatcontainer/layeredchat.core/index.json"
          versions = []
          try:
              with urllib.request.urlopen(url, timeout=45) as response:
                  payload = json.loads(response.read().decode())
                  versions = [v for v in payload.get("versions", []) if pattern.match(v)]
          except urllib.error.HTTPError as error:
              if error.code != 404:
                  raise
          if not versions:
              chosen = base
          else:
              best = max(versions, key=lambda v: tuple(int(p) for p in v.split(".")))
              major, minor, patch = (int(p) for p in best.split("."))
              chosen = f"{major}.{minor}.{patch + 1}"
          print(chosen)
          PY
          )
          echo "version=${CHOSEN}" >> "$GITHUB_OUTPUT"
          echo "Publishing version ${CHOSEN} (NuGet line ${CHOSEN%.*}.x from Directory.Build.props)"

      - name: Restore
        run: dotnet restore LayeredChat.sln

      - name: Build and test
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          dotnet build LayeredChat.sln -c Release --no-restore -p:Version="${VERSION}" -p:PackageVersion="${VERSION}"
          dotnet test LayeredChat.sln -c Release --no-build --verbosity normal

      - name: Pack
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          dotnet pack LayeredChat.sln -c Release --no-build -o "${GITHUB_WORKSPACE}/artifacts" \
            -p:Version="${VERSION}" -p:PackageVersion="${VERSION}"

      - name: Push packages to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${NUGET_API_KEY}" ]; then
            echo "NUGET_API_KEY is not set. Add it under Repository secrets."
            exit 1
          fi
          shopt -s nullglob
          for f in "${GITHUB_WORKSPACE}"/artifacts/*.nupkg; do
            dotnet nuget push "$f" --api-key "${NUGET_API_KEY}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done
          for f in "${GITHUB_WORKSPACE}"/artifacts/*.snupkg; do
            dotnet nuget push "$f" --api-key "${NUGET_API_KEY}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done
